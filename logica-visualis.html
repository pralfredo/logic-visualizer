<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logica Visualis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,500&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
/* ===========================================================================
   style.css — "modern editorial" design system
   High-contrast ink & light, electric cobalt / vermilion / emerald accents.
   Type: Fraunces (display) · Space Grotesk (body/UI) · IBM Plex Mono (formulae)
   ========================================================================= */
:root{
  --ink:#15171c; --paper:#ecebe6; --parchment:#ffffff; --warm:#e2e1d9;
  --accent:#2f2cd6;   /* electric cobalt */
  --accent2:#e23b2e;  /* vermilion       */
  --accent3:#0e8a5f;  /* emerald         */
  --gold:#bf8410;     /* amber           */
  --rule:#d8d6cd; --muted:#6a6c66;
  --serif:'Fraunces','Georgia',serif;
  --body:'Space Grotesk',system-ui,-apple-system,sans-serif;
  --mono:'IBM Plex Mono','SFMono-Regular',monospace;
  --r:7px; --rl:13px;
  --sidebar:252px;
}
@media (prefers-color-scheme: dark){
  :root{
    --ink:#eef0f4; --paper:#0e1014; --parchment:#16181e; --warm:#222530;
    --accent:#8482ff; --accent2:#ff6a5a; --accent3:#3fc78f; --gold:#e0b250;
    --rule:#2a2d36; --muted:#9a9da6;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--body); background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv05";
}
h1,h2,h3,h4{font-family:var(--serif);font-weight:600;line-height:1.1;letter-spacing:-.01em;
  font-variation-settings:"opsz" 80,"SOFT" 30}
a{color:var(--accent);text-decoration:none}
code,.mono{font-family:var(--mono)}

/* ---- dashing polish (overrides a few base looks; vars above re-theme all) -- */
.brand{position:relative}
.brand::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2))}
.brand h1{font-weight:900;font-size:21px;letter-spacing:-.02em;
  font-variation-settings:"opsz" 144,"SOFT" 0,"WONK" 1}
.module-head .kicker{font-weight:600;color:var(--accent2)}
.module-head h2{font-size:33px;font-weight:900;
  font-variation-settings:"opsz" 144,"SOFT" 0,"WONK" 1}
.nav-item .ni-no{font-weight:600}
.nav-item.active{border-left-width:4px}
.card{box-shadow:0 1px 2px rgba(0,0,0,.04)}
.badge{letter-spacing:.01em}
.btn.primary,.btn.active{box-shadow:0 1px 0 rgba(0,0,0,.15)}


/* ---- shell -------------------------------------------------------------- */
.shell{display:grid;grid-template-columns:var(--sidebar) 1fr;height:100vh;overflow:hidden}

/* ---- sidebar ------------------------------------------------------------ */
.sidebar{
  background:var(--parchment);border-right:1px solid var(--rule);
  display:flex;flex-direction:column;overflow-y:auto;
}
.brand{padding:22px 20px 16px;border-bottom:1px solid var(--rule)}
.brand h1{font-size:19px;color:var(--accent);letter-spacing:-.4px}
.brand .tag{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.04em}
.toc{padding:10px 0;flex:1}
.toc .label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:10px 20px 6px}
.nav-item{
  display:flex;flex-direction:column;gap:1px;padding:9px 20px;cursor:pointer;
  border-left:3px solid transparent;transition:background .12s;
}
.nav-item:hover{background:var(--warm)}
.nav-item.active{background:var(--warm);border-left-color:var(--accent)}
.nav-item .ni-no{font-family:var(--mono);font-size:10px;color:var(--gold)}
.nav-item .ni-title{font-family:var(--serif);font-size:15px;font-weight:700}
.nav-item.active .ni-title{color:var(--accent)}
.nav-item .ni-sub{font-size:11.5px;color:var(--muted);line-height:1.35}
.sidebar-foot{padding:14px 20px;border-top:1px solid var(--rule);font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ---- stage -------------------------------------------------------------- */
.stage{overflow-y:auto;height:100vh}
.module-head{padding:26px 36px 18px;border-bottom:1px solid var(--rule);background:var(--parchment)}
.module-head .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.module-head h2{font-size:28px;margin:6px 0 8px;letter-spacing:-.5px}
.module-head p{color:var(--muted);max-width:70ch;font-size:14.5px}
.module-body{padding:24px 36px 60px}

/* ---- generic panels & cards -------------------------------------------- */
.grid{display:grid;gap:20px}
.card{background:var(--parchment);border:1px solid var(--rule);border-radius:var(--rl);padding:18px 20px}
.card h3{font-size:15px;margin-bottom:12px;color:var(--accent)}
.card h4{font-size:13px;font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px}
.muted{color:var(--muted)}
.prose{max-width:72ch}
.prose p{margin-bottom:12px}
.prose b{color:var(--accent)}

/* ---- controls ----------------------------------------------------------- */
button.btn,.btn{
  font-family:var(--mono);font-size:12px;padding:6px 13px;border:1px solid var(--rule);
  border-radius:var(--r);background:var(--paper);color:var(--ink);cursor:pointer;transition:all .13s;
}
.btn:hover{background:var(--warm)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{opacity:.88}
.btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

input[type=text],input[type=number],select{
  font-family:var(--mono);font-size:13px;background:var(--paper);color:var(--ink);
  border:1px solid var(--rule);border-radius:var(--r);padding:7px 10px;
}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:none;border-color:var(--accent)}
input[type=range]{accent-color:var(--accent);width:100%}
label.lab{font-family:var(--mono);font-size:11.5px;color:var(--muted)}

.symrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.sym{font-family:var(--mono);font-size:14px;padding:3px 8px;border:1px solid var(--rule);border-radius:5px;background:var(--paper);cursor:pointer;color:var(--ink)}
.sym:hover{background:var(--warm)}

/* ---- badges ------------------------------------------------------------- */
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-family:var(--mono);font-size:11px;font-weight:600}
.b-ok{background:rgba(31,92,61,.16);color:var(--accent3)}
.b-no{background:rgba(124,44,44,.16);color:var(--accent2)}
.b-info{background:rgba(39,64,110,.14);color:var(--accent)}
.b-warn{background:rgba(169,121,27,.18);color:var(--gold)}
.tag-ok{color:var(--accent3);font-weight:600}
.tag-no{color:var(--accent2);font-weight:600}

/* ---- tables ------------------------------------------------------------- */
table.tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12.5px}
table.tbl th{text-align:left;padding:5px 9px;border-bottom:1px solid var(--rule);color:var(--muted);font-weight:500}
table.tbl td{padding:5px 9px;border-bottom:1px solid var(--rule)}
table.tbl tr:last-child td{border-bottom:none}

/* ---- canvas wrap -------------------------------------------------------- */
.canvas-card{background:var(--paper);border:1px solid var(--rule);border-radius:var(--rl);overflow:hidden;position:relative}
canvas{display:block}
.tooltip{position:absolute;background:var(--parchment);border:1px solid var(--rule);border-radius:6px;padding:5px 9px;font-family:var(--mono);font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:5}

/* ---- axiom list --------------------------------------------------------- */
.axiom{display:flex;align-items:flex-start;gap:9px;padding:7px 10px;border:1px solid var(--rule);border-radius:7px;background:var(--paper);margin-bottom:6px}
.axiom .name{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);min-width:22px}
.axiom .f{font-family:var(--mono);font-size:12.5px;flex:1}
.axiom .st{margin-left:auto}

/* ---- two-col layouts ---------------------------------------------------- */
.split{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
@media (max-width:1080px){.split{grid-template-columns:1fr}}
.split-even{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
@media (max-width:900px){.split-even{grid-template-columns:1fr}}

/* hypotheses / grammar list */
.hyp{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--rule);border-radius:8px;margin-bottom:7px;background:var(--paper)}
.hyp .h-name{font-family:var(--serif);font-weight:700;font-size:14px}
.hyp .h-desc{font-size:12px;color:var(--muted)}
.hyp.dead{opacity:.4}
.hyp.dead .h-name{text-decoration:line-through}
.hyp.best{border-color:var(--accent);border-width:2px}

.chip{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:6px;background:var(--warm);color:var(--ink);margin:2px}
.chip.pos{background:rgba(31,92,61,.16);color:var(--accent3)}
.chip.neg{background:rgba(124,44,44,.16);color:var(--accent2)}

/* bars */
.bar-track{height:14px;background:var(--warm);border-radius:7px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);transition:width .25s}
.bar-fill.win{background:var(--accent3)}

/* ===========================================================================
   Responsive layout — desktop is the DEFAULT (.shell grid above); a single
   mobile breakpoint turns the sidebar into an off-canvas drawer. No competing
   !important blocks, so wide screens always get the grid.
   ========================================================================= */

/* hamburger button: hidden on desktop, shown only in the mobile drawer rules */
.menu-toggle{ display:none; }

/* overview cards */
.overview-grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(220px, 1fr));
  gap:22px;
  margin-top:20px;
}
@media (max-width:1100px){
  .overview-grid{ grid-template-columns:repeat(2, minmax(220px, 1fr)); }
}

/* ---- mobile drawer (phones / narrow windows) --------------------------- */
@media (max-width:820px){
  html,body{ overflow-x:hidden; }

  .shell{ display:block; height:auto; min-height:100vh; overflow:visible; }

  .stage{ height:auto; min-height:100vh; overflow:visible; padding-top:64px; width:100%; }

  .sidebar{
    position:fixed; top:0; left:0; bottom:0;
    width:min(86vw, 320px); z-index:9998;
    background:var(--parchment);
    box-shadow:4px 0 26px rgba(0,0,0,.3);
    transform:translateX(-105%);
    transition:transform .25s ease;
  }
  body.menu-open .sidebar{ transform:translateX(0); }

  /* dim backdrop behind the open drawer (drawn on the toggle button's ::after-free body) */
  body.menu-open .stage::before{
    content:''; position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:9997;
  }

  .menu-toggle{
    display:inline-flex; align-items:center; justify-content:center;
    position:fixed; top:12px; left:12px; z-index:10000;
    width:46px; height:46px; font-size:20px; cursor:pointer;
    font-family:var(--mono);
    background:var(--parchment); color:var(--ink);
    border:1px solid var(--rule); border-radius:11px;
    box-shadow:0 2px 12px rgba(0,0,0,.22);
  }

  .overview-grid{ grid-template-columns:1fr; }
  .module-head{ padding:60px 18px 16px; }
  .module-head h2{ font-size:21px; letter-spacing:-.3px; overflow-wrap:break-word; }
  .module-head p{ font-size:13.5px; }
  .module-body{ padding:18px 16px 70px; }
  .split, .split-even{ grid-template-columns:1fr; }
  canvas{ max-width:100%; }
}

/* scene (gavagai) */
.scene{position:relative;background:var(--paper);border:1px solid var(--rule);border-radius:var(--rl);min-height:200px;padding:16px;display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap}
.utterance{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--accent2)}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}

  </style>
</head>
<body>
  <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="stage" id="stage"></main>
  </div>
  <script>
/* ===== js/core.js ===== */
/* ===========================================================================
   core.js — shared engine for the Interactive Logic Visualizer
   - global namespace LV
   - module registry + router hooks
   - modal/epistemic formula parser (-> AST)
   - generic AST evaluator parameterised by a "frame interpretation"
   - small DOM helper
   No build step, no ES modules: loads as a classic <script> so the project
   runs directly from file:// by double-clicking index.html.
   ========================================================================= */
(function (global) {
  'use strict';

  var LV = global.LV || {};
  global.LV = LV;

  /* ---- module registry ---------------------------------------------------- */
  LV.modules = LV.modules || [];
  LV.register = function (def) { LV.modules.push(def); };

  /* ---- tiny DOM helper ---------------------------------------------------- */
  // el('div.card#main', {onclick:fn}, child, child...)
  LV.el = function (sel, attrs) {
    var parts = sel.split(/(?=[.#])/);
    var tag = parts[0] && parts[0][0] !== '.' && parts[0][0] !== '#' ? parts.shift() : 'div';
    var node = document.createElement(tag);
    parts.forEach(function (p) {
      if (p[0] === '.') node.classList.add(p.slice(1));
      else if (p[0] === '#') node.id = p.slice(1);
    });
    var i = 2;
    if (attrs && attrs.nodeType === undefined && typeof attrs !== 'string') {
      Object.keys(attrs).forEach(function (k) {
        if (k === 'html') node.innerHTML = attrs[k];
        else if (k === 'text') node.textContent = attrs[k];
        else if (k.slice(0, 2) === 'on') node.addEventListener(k.slice(2), attrs[k]);
        else if (k === 'style' && typeof attrs[k] === 'object')
          Object.assign(node.style, attrs[k]);
        else node.setAttribute(k, attrs[k]);
      });
    } else { i = 1; }
    for (; i < arguments.length; i++) {
      var c = arguments[i];
      if (c == null) continue;
      node.appendChild(c.nodeType ? c : document.createTextNode(String(c)));
    }
    return node;
  };

  LV.clear = function (node) { while (node.firstChild) node.removeChild(node.firstChild); return node; };

  /* ---- subscript helpers -------------------------------------------------- */
  var SUB = { '0': '₀', '1': '₁', '2': '₂', '3': '₃', '4': '₄', '5': '₅', '6': '₆', '7': '₇', '8': '₈', '9': '₉' };
  var UNSUB = { '₀': '0', '₁': '1', '₂': '2', '₃': '3', '₄': '4', '₅': '5', '₆': '6', '₇': '7', '₈': '8', '₉': '9' };
  LV.sub = function (n) { return String(n).split('').map(function (d) { return SUB[d] || d; }).join(''); };

  /* =========================================================================
     FORMULA PARSER
     Accepts unicode operators and ascii fallbacks:
       □ [] | ◇ <> | ¬ ! ~ | ∧ & | ∨ + | → -> | ↔ <-> | ⊤ T1 | ⊥ F0
     Agents: K1 K₁ K2 K₂ ...   Group operators: C (common), D (distributed)
     Atoms: single lowercase letters a..z
     Precedence (loose -> tight): ↔  <  →  <  ∨  <  ∧  <  unary(¬ □ ◇ K C D)
     → is right-associative.
     ========================================================================= */

  function normalize(s) {
    return s
      .replace(/<->/g, '↔').replace(/<=>/g, '↔')
      .replace(/->/g, '→').replace(/=>/g, '→')
      .replace(/\[\]/g, '□').replace(/<>/g, '◇')
      .replace(/!/g, '¬').replace(/~/g, '¬')
      .replace(/&/g, '∧');
    // note: '|' and '+' are NOT auto-mapped to ∨ to avoid clashing with text; use ∨.
  }

  function tokenize(s) {
    s = normalize(s);
    var toks = [], i = 0;
    while (i < s.length) {
      var c = s[i];
      if (/\s/.test(c)) { i++; continue; }
      if ('()¬∧∨→↔□◇⊤⊥'.indexOf(c) >= 0) { toks.push({ k: c }); i++; continue; }
      if (c === 'K') {
        var j = i + 1, num = '';
        while (j < s.length && (/[0-9]/.test(s[j]) || UNSUB[s[j]])) {
          num += UNSUB[s[j]] || s[j]; j++;
        }
        toks.push({ k: 'K', agent: num ? parseInt(num, 10) : 1 });
        i = j; continue;
      }
      if (c === 'C') { toks.push({ k: 'C' }); i++; continue; }
      if (c === 'D') { toks.push({ k: 'D' }); i++; continue; }
      if (/[a-z]/.test(c)) { toks.push({ k: 'atom', name: c }); i++; continue; }
      throw new Error('Unexpected character: "' + c + '"');
    }
    return toks;
  }

  LV.parse = function (str) {
    var toks = tokenize(str), pos = 0;
    function peek() { return toks[pos]; }
    function next() { return toks[pos++]; }
    function expect(k) {
      var t = next();
      if (!t || t.k !== k) throw new Error('Expected ' + k);
      return t;
    }
    function parseIff() {
      var a = parseImp();
      while (peek() && peek().k === '↔') { next(); a = { t: 'iff', a: a, b: parseImp() }; }
      return a;
    }
    function parseImp() {
      var a = parseOr();
      if (peek() && peek().k === '→') { next(); return { t: 'imp', a: a, b: parseImp() }; }
      return a;
    }
    function parseOr() {
      var a = parseAnd();
      while (peek() && peek().k === '∨') { next(); a = { t: 'or', a: a, b: parseAnd() }; }
      return a;
    }
    function parseAnd() {
      var a = parseUnary();
      while (peek() && peek().k === '∧') { next(); a = { t: 'and', a: a, b: parseUnary() }; }
      return a;
    }
    function parseUnary() {
      var t = peek();
      if (!t) throw new Error('Unexpected end of formula');
      if (t.k === '¬') { next(); return { t: 'not', a: parseUnary() }; }
      if (t.k === '□') { next(); return { t: 'box', a: parseUnary() }; }
      if (t.k === '◇') { next(); return { t: 'dia', a: parseUnary() }; }
      if (t.k === 'K') { next(); return { t: 'K', agent: t.agent, a: parseUnary() }; }
      if (t.k === 'C') { next(); return { t: 'C', a: parseUnary() }; }
      if (t.k === 'D') { next(); return { t: 'D', a: parseUnary() }; }
      return parseAtom();
    }
    function parseAtom() {
      var t = peek();
      if (!t) throw new Error('Unexpected end of formula');
      if (t.k === '(') { next(); var e = parseIff(); expect(')'); return e; }
      if (t.k === '⊤') { next(); return { t: 'top' }; }
      if (t.k === '⊥') { next(); return { t: 'bot' }; }
      if (t.k === 'atom') { next(); return { t: 'atom', name: t.name }; }
      throw new Error('Unexpected token: ' + t.k);
    }
    var ast = parseIff();
    if (pos < toks.length) throw new Error('Trailing tokens after formula');
    return ast;
  };

  /* render an AST back to a pretty unicode string (for echoing) */
  LV.show = function (ast) {
    function p(node, parentPrec) {
      var prec = { iff: 1, imp: 2, or: 3, and: 4 };
      var s;
      switch (node.t) {
        case 'atom': return node.name;
        case 'top': return '⊤';
        case 'bot': return '⊥';
        case 'not': return '¬' + p(node.a, 5);
        case 'box': return '□' + p(node.a, 5);
        case 'dia': return '◇' + p(node.a, 5);
        case 'K': return 'K' + LV.sub(node.agent) + p(node.a, 5);
        case 'C': return 'C' + p(node.a, 5);
        case 'D': return 'D' + p(node.a, 5);
        case 'and': s = p(node.a, 4) + ' ∧ ' + p(node.b, 4); return wrap(4, parentPrec, s);
        case 'or': s = p(node.a, 3) + ' ∨ ' + p(node.b, 3); return wrap(3, parentPrec, s);
        case 'imp': s = p(node.a, 3) + ' → ' + p(node.b, 2); return wrap(2, parentPrec, s);
        case 'iff': s = p(node.a, 2) + ' ↔ ' + p(node.b, 1); return wrap(1, parentPrec, s);
      }
      return '?';
    }
    function wrap(prec, parent, s) { return prec < parent ? '(' + s + ')' : s; }
    return p(ast, 0);
  };

  /* collect atoms used in a formula */
  LV.atomsOf = function (ast, acc) {
    acc = acc || {};
    if (!ast) return acc;
    if (ast.t === 'atom') acc[ast.name] = true;
    if (ast.a) LV.atomsOf(ast.a, acc);
    if (ast.b) LV.atomsOf(ast.b, acc);
    return acc;
  };

  /* =========================================================================
     GENERIC EVALUATOR
     A "frame interpretation" supplies how the modal connectives are read:
       interp = {
         atom(name, point) -> bool,
         box(evalChild, point) -> bool,        // □
         dia(evalChild, point) -> bool,        // ◇
         K(agent, evalChild, point) -> bool,   // optional
         C(evalChild, point) -> bool,          // optional
         D(evalChild, point) -> bool           // optional
       }
     evalChild is a function(point) the interpretation calls on accessible points.
     ========================================================================= */
  LV.evalAST = function (ast, point, interp) {
    function ev(node, pt) {
      switch (node.t) {
        case 'atom': return !!interp.atom(node.name, pt);
        case 'top': return true;
        case 'bot': return false;
        case 'not': return !ev(node.a, pt);
        case 'and': return ev(node.a, pt) && ev(node.b, pt);
        case 'or': return ev(node.a, pt) || ev(node.b, pt);
        case 'imp': return !ev(node.a, pt) || ev(node.b, pt);

/* ===========================================================================
   m9-nd.js — Natural deduction (Fitch-style) proof checker
   Each line carries a formula, a rule, cited line numbers, and a scope depth.
   Assumptions open boxes; introduction rules discharge them. The checker
   verifies every line against the rule, enforces scope/accessibility, and
   reports whether the proof establishes the goal from its premises. The pure
   checker lives on LV.nd and is tested independently of the DOM.
   ========================================================================= */

  'use strict';

  var nd = {};

  function S(ast) { return LV.show(ast); }

    for (var i = 0; i < n; i++) {
      try { F[i] = LV.parse(lines[i].formula); parseErr[i] = null; }
      catch (e) { F[i] = null; parseErr[i] = e.message; }
    }

        else boxes[i] = stack.slice();

    }

        case 'assumption': break;

          if (S(Ai) !== S(F[c[0]])) e = 'reiteration must copy the cited line';
          break;
        case 'andI':
          if (!need(2)) break;
          if (!acc(c[0], i) || !acc(c[1], i)) { e = 'cited line not in scope'; break; }

/* ===== js/m1-kripke.js ===== */
/* ===========================================================================
   m1-kripke.js — Possible-worlds semantics
   Build a frame on a canvas; evaluate modal/epistemic formulas world-by-world;
   read off frame properties; switch among K / T / S4 / S5 / epistemic.
   ========================================================================= */
(function () {
  'use strict';
  var el = LV.el;

  var SYSTEMS = {
    K:  { name: 'K',  axioms: ['K'],                req: [] },
    T:  { name: 'T',  axioms: ['K', 'T'],            req: ['reflexive'] },
    S4: { name: 'S4', axioms: ['K', 'T', '4'],       req: ['reflexive', 'transitive'] },
    S5: { name: 'S5', axioms: ['K', 'T', 'B', '4', '5'], req: ['reflexive', 'symmetric', 'transitive'] },
    Ep: { name: 'S5 (epistemic)', axioms: ['K', 'T', '4', '5'], req: ['equivalence'] }
  };
  var AX = {
    K:  { f: '□(p→q)→(□p→□q)', d: 'distribution (holds in every Kripke frame)' },
    T:  { f: '□p→p',           d: 'reflexivity — what is necessary is true' },
    '4':{ f: '□p→□□p',         d: 'transitivity — positive introspection' },
    B:  { f: 'p→□◇p',          d: 'symmetry — the Brouwer axiom' },
    '5':{ f: '◇p→□◇p',         d: 'euclidean — negative introspection' }
  };

  function mod() {
    var worlds = [], edges = [], nextId = 0, sel = null, sys = 'S5';
    var tool = 'world', relSrc = null, dragging = null, dox = 0, doy = 0, mx = 0, my = 0;
    var R = 28;
    var canvas, ctx, tip, refs = {};

    function preset(name) {
      worlds = []; edges = []; nextId = 0; sel = null; relSrc = null;
      function w(x, y, v) { worlds.push({ id: nextId, x: x, y: y, label: 'w' + LV.sub(nextId + 1), val: v }); nextId++; }
      function e(a, b) { edges.push({ from: a, to: b, agent: 1 }); }
      if (name === 's5') {
        w(150, 150, { p: 1, q: 0 }); w(360, 110, { p: 0, q: 1 }); w(330, 270, { p: 1, q: 1 });
        [0, 1, 2].forEach(function (i) { e(i, i); });
        e(0, 1); e(1, 0); e(1, 2); e(2, 1); e(0, 2); e(2, 0); sys = 'S5';
      } else if (name === 's4') {
        w(90, 180, { p: 1, q: 0 }); w(240, 180, { p: 1, q: 1 }); w(390, 180, { p: 0, q: 1 }); w(540, 180, { p: 0, q: 0 });
        [0, 1, 2, 3].forEach(function (i) { e(i, i); });
        e(0, 1); e(1, 2); e(2, 3); e(0, 2); e(0, 3); e(1, 3); sys = 'S4';
      } else if (name === 'failT') {
        w(160, 160, { p: 1 }); w(380, 160, { p: 0 });
        e(0, 1); sys = 'K'; // no reflexive loops: T should fail
      }
      sys && setSys(sys);
      refresh();
    }

    /* ---- geometry / hit-testing ---- */
    function worldAt(x, y) {
      for (var i = worlds.length - 1; i >= 0; i--)
        if (Math.hypot(worlds[i].x - x, worlds[i].y - y) < R) return worlds[i];
      return null;
    }

    /* ---- evaluation ---- */
    function interp() {
      return {
        atom: function (n, w) { var ww = worlds.find(function (x) { return x.id === w; }); return ww && ww.val[n]; },
        box: function (child, w) { var s = LV.rel.succ(edges, w); return s.every(child); },
        dia: function (child, w) { var s = LV.rel.succ(edges, w); return s.some(child); },
        K: function (ag, child, w) { var s = LV.rel.succ(edges, w); return s.every(child); }
      };
    }
    function evalAt(ast, w) { return LV.evalAST(ast, w, interp()); }

    function evaluate() {
      var raw = refs.formula.value.trim();
      LV.clear(refs.evalOut);
      if (!raw || !worlds.length) { renderTruth(null); return; }
      var ast;
      try { ast = LV.parse(raw); }
      catch (err) { refs.evalOut.appendChild(el('span.badge.b-no', { text: '⚠ ' + err.message })); renderTruth(null); return; }
      var rows = worlds.map(function (w) { return { w: w, v: evalAt(ast, w.id) }; });
      var all = rows.every(function (r) { return r.v; });
      var none = rows.every(function (r) { return !r.v; });
      refs.evalOut.appendChild(
        el('span', { 'class': 'badge ' + (all ? 'b-ok' : none ? 'b-no' : 'b-info') },
          all ? '✓ valid in this model' : none ? '✗ false at every world' : '~ true at some worlds')
      );
      refs.evalOut.appendChild(el('span.mono', { style: { marginLeft: '10px', fontSize: '12px', color: 'var(--muted)' }, text: LV.show(ast) }));
      renderTruth(rows);

    }

    function renderTruth(rows) {
      var pane = refs.truth; LV.clear(pane);
      if (!rows) { pane.appendChild(el('p.muted', { style: { fontSize: '12px' }, text: 'evaluate a formula to see truth at each world' })); return; }

/* ===== js/m4-decision.js ===== */
/* ===========================================================================
   m4-decision.js — Decision theory
   (1) A general expected-utility calculator over an acts × states matrix.
   (2) Newcomb's problem, the canonical case where evidential and causal
       decision theory diverge: EDT one-boxes (your choice is evidence about
       the predictor's already-made prediction); CDT two-boxes (dominance —
       the choice cannot causally change a sealed box). A slider over predictor
       accuracy shows exactly where the two theories disagree, with a nod to
       the functional decision theory used in modern AI agent-foundations work.
   ========================================================================= */
(function () {
  'use strict';
  var el = LV.el;

  function bar(label, value, max, win) {
    var pct = max > 0 ? Math.max(0, value / max) * 100 : 0;
    var fill = el('div', { 'class': 'bar-fill' + (win ? ' win' : '') }); fill.style.width = pct.toFixed(1) + '%';
    return el('div', { style: { marginBottom: '8px' } },
      el('div', { style: { display: 'flex', justifyContent: 'space-between', fontFamily: 'var(--mono)', fontSize: '12px', marginBottom: '3px' } },
        el('span', { text: label }), el('span', { style: { fontWeight: '600' }, text: '$' + Math.round(value).toLocaleString() })),
      el('div.bar-track', null, fill));
  }

  function mod() {
    var refs = {};

    /* ---- (1) generic EU calculator ---- */
    // 2 acts × 2 states default; editable utilities + state probabilities
    var euState = { p: 0.5, U: [[100, 0], [40, 40]], actNames: ['risky', 'safe'], stateNames: ['boom', 'bust'] };

    function renderEU() {
      var s = euState; var pane = refs.eu; LV.clear(pane);
      var probs = [s.p, 1 - s.p];
      // matrix table with editable utilities
      var t = el('table.tbl');
      var head = el('tr', null, el('th', { text: 'act \\ state' }));
      s.stateNames.forEach(function (n, j) { head.appendChild(el('th', { text: n + ' (' + (probs[j] * 100).toFixed(0) + '%)' })); });
      head.appendChild(el('th', { text: 'EU' }));
      t.appendChild(head);
      var eus = s.U.map(function (row) { return row.reduce(function (a, u, j) { return a + probs[j] * u; }, 0); });
      var best = eus.indexOf(Math.max.apply(null, eus));
      s.U.forEach(function (row, i) {
        var tr = el('tr', null, el('td', { text: s.actNames[i] }));
        row.forEach(function (u, j) {
          var inp = el('input', { type: 'number', value: u, style: { width: '64px', padding: '3px 6px' } });
          inp.addEventListener('input', function () { s.U[i][j] = parseFloat(inp.value) || 0; renderEU(); });
          tr.appendChild(el('td', null, inp));
        });
        tr.appendChild(el('td', { 'class': i === best ? 'tag-ok' : '', text: Math.round(eus[i]).toLocaleString() + (i === best ? ' ◀' : '') }));
        t.appendChild(tr);
      });
      pane.appendChild(t);
      pane.appendChild(el('div', { style: { marginTop: '12px' } },
        el('label.lab', { text: 'P(' + s.stateNames[0] + ') = ' + (s.p * 100).toFixed(0) + '%' })));
      var slider = el('input', { type: 'range', min: '0', max: '100', value: String(s.p * 100) });
      slider.addEventListener('input', function () { s.p = parseInt(slider.value, 10) / 100; renderEU(); });
      pane.appendChild(slider);
      pane.appendChild(el('p.muted', { style: { fontSize: '12px', marginTop: '8px' } },
        'EU(act) = Σ P(state)·U(act,state). The recommended act maximises expected utility under the probability distribution.'));
    }

    /* ---- (2) Newcomb ---- */
    var newcomb = { acc: 0.9, prior: 0.5 };
    var OPAQUE = 1000000, TRANSPARENT = 1000;

    function renderNewcomb() {
      var a = newcomb.acc; var pane = refs.newcomb; LV.clear(pane);
      // Payoffs: B = opaque box ($1M if predicted one-box, else $0); A = transparent ($1000, always taken if two-boxing)
      // EDT: condition on the act. P(million | one-box) = acc ; P(million | two-box) = 1 - acc
      var eu_one_EDT = a * OPAQUE + (1 - a) * 0;                 // one-box: take only B
      var eu_two_EDT = a * 0 + (1 - a) * OPAQUE + TRANSPARENT;   // two-box: B is likely empty + always get A

      var eu_two_CDT = p * (OPAQUE + TRANSPARENT) + (1 - p) * (0 + TRANSPARENT); // dominance: +1000 in both columns
      var edtPick = eu_one_EDT >= eu_two_EDT ? 'one-box' : 'two-box';
      var cdtPick = eu_one_CDT >= eu_two_CDT ? 'one-box' : 'two-box';

      // controls
      pane.appendChild(el('label.lab', { text: 'predictor accuracy = ' + (a * 100).toFixed(0) + '%' }));
      var sl = el('input', { type: 'range', min: '50', max: '100', value: String(a * 100) });
      sl.addEventListener('input', function () { newcomb.acc = parseInt(sl.value, 10) / 100; renderNewcomb(); });
      pane.appendChild(sl);

      // two theory cards
      var cols = el('div.split-even', { style: { marginTop: '14px' } });
      var edt = el('div.card', { style: { background: 'var(--paper)' } });
      edt.appendChild(el('h4', { text: 'Evidential DT' }));
      edt.appendChild(el('p.muted', { style: { fontSize: '11.5px', marginBottom: '10px' } }, 'conditions on the act as evidence about the prediction'));

    pd: { name: "Prisoner's Dilemma", rows: ['Cooperate', 'Defect'], cols: ['Cooperate', 'Defect'],
      P: [[[3, 3], [0, 5]], [[5, 0], [1, 1]]] },
    stag: { name: 'Stag Hunt', rows: ['Stag', 'Hare'], cols: ['Stag', 'Hare'],
      P: [[[4, 4], [0, 3]], [[3, 0], [3, 3]]] },
    bos: { name: 'Battle of the Sexes', rows: ['Opera', 'Football'], cols: ['Opera', 'Football'],
      P: [[[2, 1], [0, 0]], [[0, 0], [1, 2]]] },

      P: [[[1, -1], [-1, 1]], [[-1, 1], [1, -1]]] },

      pane.appendChild(el('p.muted', { style: { fontSize: '11.5px', marginTop: '8px' } },

          el('span.muted', { style: { fontSize: '12px', marginLeft: '8px' }, text: 'payoff (' + g.P[c[0]][c[1]][0] + ', ' + g.P[c[0]][c[1]][1] + ')' })));

      var m = mixedNE();

      if (m.ok) {

          ', Column plays ', el('b', { text: g.cols[0] }), ' with q = ', el('b', { text: m.q.toFixed(2) }), '.'));
        R.appendChild(el('p.muted', { style: { fontSize: '11.5px' } }, 'Each player mixes precisely so as to leave the other indifferent — the hallmark of a mixed equilibrium.'));
      } else R.appendChild(el('p.muted', { style: { fontSize: '12.5px' }, text: 'no fully-mixed equilibrium (the indifference conditions have no interior solution here).' }));

        dom.forEach(function (d) { R.appendChild(el('div', { style: { fontSize: '12.5px' } }, el('span.badge.b-warn', { text: d }))); });
      }

    function loadPreset(k) {

    function mount(stage) {

        el('div.kicker', { text: 'Module VII · strategic interaction' }),
        el('h2', { text: 'Game theory — Nash equilibrium' }),

/* ===== js/m7-agt.js ===== */
/* ===========================================================================
   m7-agt.js — Algorithmic game theory
   When many selfish agents route themselves through a shared network, the
   equilibrium can be worse than the social optimum. The PRICE OF ANARCHY is
   that ratio. Two canonical instances:
     1. Pigou's example — selfish routing gives total cost 1 vs optimum 3/4,
        so the price of anarchy is 4/3.
     2. Braess's paradox — adding a fast road to a network can make EVERYONE
        slower at equilibrium. The closed-form equilibria are computed and
        drawn; the user toggles the extra road and watches latency rise.
   ========================================================================= */
(function () {
  'use strict';
  var el = LV.el;

  function mod() {
    var refs = {}, canvasP, ctxP, canvasB, ctxB;
    var f = 1.0;          // Pigou: fraction of flow on the variable (x) edge
    var braessEdge = true; // Braess: is the zero-cost shortcut present?

    /* ---------- Pigou ---------- */
    function pigouCost(frac) { return frac * frac + (1 - frac) * 1; } // f·ℓ_bottom + (1-f)·ℓ_top
    function renderPigou() {
      var cost = pigouCost(f);
      var selfish = pigouCost(1);   // = 1
      var optimum = pigouCost(0.5); // = 0.75
      LV.clear(refs.pigouOut);
      refs.pigouOut.appendChild(el('table.tbl', null,
        row('your split — fraction on the x-edge', f.toFixed(2), 'var(--ink)'),
        row('total latency at your split', cost.toFixed(3), 'var(--ink)'),
        row('selfish equilibrium (all on x-edge)', selfish.toFixed(3), 'var(--accent2)'),
        row('social optimum (split 50/50)', optimum.toFixed(3), 'var(--accent3)'),
        row('price of anarchy = selfish / optimum', (selfish / optimum).toFixed(3) + '  (= 4/3)', 'var(--accent)')));
      drawPigou(cost);
    }
    function row(k, v, c) { return el('tr', null, el('td', { text: k }), el('td', { style: { color: c, fontWeight: '600' }, text: v })); }

    function drawPigou(cost) {
      if (!ctxP) return; var C = LV.theme(), w = canvasP.width, h = canvasP.height;
      ctxP.clearRect(0, 0, w, h); ctxP.fillStyle = C.bg; ctxP.fillRect(0, 0, w, h);
      var s = [60, h / 2], t = [w - 60, h / 2];
      // top edge (constant latency 1), bottom edge (latency = x)
      edgeCurve(ctxP, s, t, -70, C, (1 - f), 'ℓ = 1  (constant)', '1.00', C.gold);
      edgeCurve(ctxP, s, t, 70, C, f, 'ℓ = x  (congestible)', f.toFixed(2), C.accent2);

    function nodeP(ctx, p, label, C) {

    /* ---------- Braess ---------- */
    // Nodes S,A,B,T. Edges S->A (x), S->B (1), A->T (1), B->T (x), A->B (0, optional).
    function braessResult() {
      if (!braessEdge) {
        // split 1/2-1/2 over S->A->T and S->B->T; each route latency = 0.5 + 1 = 1.5
        return { latency: 1.5, total: 1.5, route: 'half take S→A→T, half take S→B→T' };

        row('shortcut A→B present?', braessEdge ? 'yes (latency 0)' : 'no', braessEdge ? 'var(--accent2)' : 'var(--muted)'),
        row('equilibrium routing', r.route, 'var(--ink)'),

      var worse = braessEdge;
      refs.braessOut.appendChild(el('div', { style: { marginTop: '10px' } },
        el('span', { 'class': 'badge ' + (worse ? 'b-no' : 'b-ok'), text: worse ? '⚠ adding the road raised latency 1.50 → 2.00' : 'without the road, latency is 1.50' })));

      ctxB.strokeStyle = col; ctxB.lineWidth = 2.4;

      ctxB.fillStyle = C.ink; ctxB.font = 'bold 13px "IBM Plex Mono", monospace'; ctxB.textAlign = 'center';
      ctxB.fillText('ℓ=' + lab, (sx + ex) / 2 + px * 12, (sy + ey) / 2 + py * 12 + 4);
    }

    function resize() {
      [canvasP, canvasB].forEach(function (cv) { if (cv) { cv.width = cv.parentElement.clientWidth; cv.height = 240; } });

    function mount(stage) {

      stage.appendChild(el('div.module-head', null,
        el('div.kicker', { text: 'Module VIII · the cost of selfishness' }),
        el('h2', { text: 'Algorithmic game theory — the price of anarchy' }),
        el('p', { text: 'When self-interested agents share a network, their Nash equilibrium can be strictly worse than what a central planner would choose. The ratio between the two is the price of anarchy. Two classic instances show it — including Braess\u2019s paradox, where building a new road makes everyone slower.' })));

      p1.appendChild(el('p.muted', { style: { fontSize: '12.5px', marginBottom: '6px' } }, 'One road has constant latency 1; the other has latency equal to its load x. Drag the split and compare your total latency with the selfish equilibrium and the social optimum.'));

      var p2 = el('div.card');
      p2.appendChild(el('h3', { text: '2 · Braess\u2019s paradox — when a new road hurts everyone' }));
      p2.appendChild(el('p.muted', { style: { fontSize: '12.5px', marginBottom: '6px' } }, 'Without the green shortcut, traffic splits evenly and every driver faces latency 1.5. Add the zero-cost shortcut and self-interest funnels everyone through it — pushing latency up to 2.0.'));
      var cwB = el('div.canvas-card'); canvasB = el('canvas'); cwB.appendChild(canvasB); p2.appendChild(cwB); ctxB = canvasB.getContext('2d');
      var tog = el('button.btn.primary', { text: 'remove the shortcut A→B', style: { marginTop: '12px' } });
      tog.addEventListener('click', function () { braessEdge = !braessEdge; tog.textContent = braessEdge ? 'remove the shortcut A→B' : 'add the shortcut A→B'; renderBraess(); });
      p2.appendChild(tog);
      refs.braessOut = el('div', { style: { marginTop: '12px' } }); p2.appendChild(refs.braessOut);

  LV.register({ id: 'agt', no: 'VIII', title: 'Algorithmic game theory', sub: 'Price of anarchy · Braess', create: mod });

/* ===== js/m5-grammar.js ===== */
/* ===========================================================================
   m5-grammar.js — Gavagai → full grammar
   Two faces of the same epistemological problem: data underdetermines theory.
   (1) Quine's "gavagai": a single ostension is compatible with mutually
       incompatible reference schemes (rabbit / undetached parts / time-slice /
       rabbithood). Adding "experiments" fails to discriminate them — the
       indeterminacy of translation.
   (2) Grammar induction: from example strings, infer the language. Several
       grammars stay consistent with any finite positive sample; only negative
       evidence (or a built-in simplicity / subset bias — read: Universal
       Grammar) forces convergence. This is Gold's theorem made tangible, and
       the formal echo of the gavagai problem.
   ========================================================================= */
(function () {
  'use strict';
  var el = LV.el;

  /* ---- candidate grammars over alphabet {a,b} ---- */
  var GRAMMARS = [
    { name: 'a*', desc: 'any run of a\u2019s', acc: function (s) { return /^a*$/.test(s); }, kind: 'regular' },
    { name: 'a*b*', desc: 'a\u2019s then b\u2019s', acc: function (s) { return /^a*b*$/.test(s); }, kind: 'regular' },
    { name: '(ab)*', desc: 'repeated ab', acc: function (s) { return /^(ab)*$/.test(s); }, kind: 'regular' },
    { name: 'aⁿbⁿ', desc: 'equal a\u2019s then b\u2019s', acc: function (s) { return /^a*b*$/.test(s) && (s.match(/a/g) || []).length === (s.match(/b/g) || []).length; }, kind: 'context-free' },
    { name: 'Σ*', desc: 'every string', acc: function (s) { return /^[ab]*$/.test(s); }, kind: 'regular (universal)' }
  ];

  // enumerate all strings over {a,b} up to length N — used to size each language
  function corpus(N) {
    var out = ['']; for (var len = 1; len <= N; len++) {
      var prev = out.filter(function (x) { return x.length === len - 1; });
      prev.forEach(function (p) { out.push(p + 'a'); out.push(p + 'b'); });
    }
    return out;
  }
  var CORP = corpus(6);

  function mod() {
    var refs = {};
    var pos = ['', 'ab', 'aabb'], neg = []; // start consistent with several grammars

    /* ---- gavagai hypotheses ---- */
    var GAV = [
      { name: 'rabbit', desc: 'the whole enduring animal' },
      { name: 'undetached rabbit-parts', desc: 'the fused collection of parts' },
      { name: 'rabbit time-slice', desc: 'a momentary stage of a rabbit' },
      { name: 'rabbithood', desc: 'the abstract universal, instantiated here' },
      { name: '\u201clo, dinner!\u201d', desc: 'a one-word observation sentence' }
    ];
    var experiments = []; // each fails to discriminate, by construction
    var EXPS = [
      'Point at the rabbit and say "gavagai?" — native assents.',
      'Point at a different rabbit — native assents again.',
      'Point at a rabbit\u2019s ear alone — native assents (parts? or still "rabbit there"?).',
      'Wait a moment, point at the same rabbit — native assents (same object? new stage?).'
    ];

    function renderGav() {
      var pane = refs.gav; LV.clear(pane);
      // each hypothesis is still alive: ostension can't separate co-extensive schemes
      GAV.forEach(function (h) {
        pane.appendChild(el('div.hyp', null,
          el('div', { style: { flex: '1' } },
            el('div.h-name', { text: h.name }),
            el('div.h-desc', { text: h.desc })),
          el('span.badge.b-warn', { text: 'still compatible' })));
      });
      LV.clear(refs.expLog);
      experiments.forEach(function (e) { refs.expLog.appendChild(el('div', { style: { fontSize: '12px', fontFamily: 'var(--mono)', color: 'var(--muted)', marginBottom: '4px' }, text: '· ' + e })); });
      if (experiments.length) refs.expLog.appendChild(el('div.badge.b-no', { style: { marginTop: '4px' }, text: 'after ' + experiments.length + ' experiment(s): ' + GAV.length + ' hypotheses survive — translation underdetermined' }));
    }

    /* ---- grammar induction ---- */
    function consistent(g) {
      return pos.every(function (s) { return g.acc(s); }) && neg.every(function (s) { return !g.acc(s); });
    }
    function size(g) { return CORP.filter(function (s) { return g.acc(s); }).length; } // language size up to len 6

    function renderGrammar() {
      // examples
      LV.clear(refs.posChips); LV.clear(refs.negChips);
      pos.forEach(function (s, i) { refs.posChips.appendChild(chip(s || 'ε', 'pos', function () { pos.splice(i, 1); renderGrammar(); })); });
      neg.forEach(function (s, i) { refs.negChips.appendChild(chip(s || 'ε', 'neg', function () { neg.splice(i, 1); renderGrammar(); })); });

      var alive = GRAMMARS.filter(consistent);
      var minSize = alive.length ? Math.min.apply(null, alive.map(size)) : Infinity;

      LV.clear(refs.hyps);
      GRAMMARS.forEach(function (g) {
        var ok = consistent(g), isBest = ok && size(g) === minSize;
        var row = el('div', { 'class': 'hyp' + (ok ? '' : ' dead') + (isBest ? ' best' : '') },
          el('div', { style: { flex: '1' } },
            el('div.h-name', { text: g.name }),
            el('div.h-desc', { text: g.desc + ' · ' + g.kind })),
          el('span.muted', { style: { fontFamily: 'var(--mono)', fontSize: '11px' }, text: size(g) + ' strings ≤6' }),
          el('span', { 'class': 'badge ' + (ok ? (isBest ? 'b-ok' : 'b-info') : 'b-no'), text: ok ? (isBest ? 'subset pick' : 'consistent') : 'refuted' }));
        refs.hyps.appendChild(row);
      });

      // verdict
      LV.clear(refs.verdict);
      var nAlive = alive.length;
      var msg, cls;
      if (nAlive === 0) { msg = 'No candidate grammar fits — the data is contradictory or outside the hypothesis class.'; cls = 'b-no'; }
      else if (nAlive === 1) { msg = 'Exactly one grammar survives: the language is identified.'; cls = 'b-ok'; }
      else { msg = nAlive + ' grammars remain consistent. With this data alone the language is NOT determined.'; cls = 'b-warn'; }
      refs.verdict.appendChild(el('span', { 'class': 'badge ' + cls, text: msg }));
      var hasNeg = neg.length > 0;
      refs.verdict.appendChild(el('p.muted', { style: { fontSize: '12.5px', marginTop: '8px' } },
        hasNeg
          ? 'Negative examples eliminate the over-general grammars (Σ* in particular). This is why explicit correction is so powerful — and why its scarcity in child language acquisition motivates an innate bias.'
          : 'Notice that Σ* is never refuted by positive data: no string you can show is outside it. Gold\u2019s theorem says no learner can identify a superfinite class from positive examples alone. To converge, a learner must add a prior — the subset principle (prefer the smallest consistent language), which here is highlighted as the "subset pick". That prior is not read off the data; it is the formal counterpart of Quine\u2019s analytical hypotheses and of Universal Grammar.'));
    }

    function chip(label, cls, onx) {
      var c = el('span', { 'class': 'chip ' + cls });
      c.appendChild(el('span', { text: label }));
      var x = el('span', { style: { cursor: 'pointer', marginLeft: '6px', opacity: '.6' }, text: '×' }); x.addEventListener('click', onx);
      c.appendChild(x); return c;
    }

    /* sample from a hidden target language */
    function sample(targetName, polarity) {
      var g = GRAMMARS.find(function (x) { return x.name === targetName; });
      var pool = CORP.filter(function (s) { return polarity === '+' ? g.acc(s) : !g.acc(s); });
      // prefer shorter, unseen strings
      pool.sort(function (a, b) { return a.length - b.length; });
      pool = pool.filter(function (s) { return pos.indexOf(s) < 0 && neg.indexOf(s) < 0; });
      if (!pool.length) return;
      var pick = pool[Math.floor(Math.random() * Math.min(pool.length, 4))];
      if (polarity === '+') pos.push(pick); else neg.push(pick);
      renderGrammar();
    }

    function mount(stage) {
      LV.clear(stage);
      stage.appendChild(el('div.module-head', null,
        el('div.kicker', { text: 'Module IX · learning & meaning' }),
        el('h2', { text: 'Gavagai → full grammar' }),
        el('p', { text: 'A native says "gavagai" as a rabbit darts past. What does the word mean? Quine\u2019s point is that no amount of pointing settles it. The same underdetermination is provable for grammar: from finitely many example sentences, several grammars always remain consistent. Convergence requires either negative evidence or a built-in inductive bias — the formal shadow of innate structure.' })));
      var body = el('div.module-body'); stage.appendChild(body);

      // PART 1 — gavagai
      var p1 = el('div.card', { style: { marginBottom: '22px' } });
      p1.appendChild(el('h3', { text: '1 · Radical translation — the indeterminacy of reference' }));
      var scene = el('div.scene');
      scene.appendChild(el('div', { style: { fontSize: '46px' } }, '🐇'));
      scene.appendChild(el('div.utterance', { text: '\u201cGavagai!\u201d' }));
      p1.appendChild(scene);
      var sp = el('div.split-even', { style: { marginTop: '16px' } });
      var left = el('div'); left.appendChild(el('h4', { text: 'co-extensive hypotheses' })); refs.gav = el('div'); left.appendChild(refs.gav); sp.appendChild(left);
      var right = el('div');
      right.appendChild(el('h4', { text: 'run an experiment' }));
      var eb = el('button.btn', { text: '👉 point and query' });
      eb.addEventListener('click', function () { if (experiments.length < EXPS.length) experiments.push(EXPS[experiments.length]); renderGav(); });
      right.appendChild(eb);
      refs.expLog = el('div', { style: { marginTop: '10px' } }); right.appendChild(refs.expLog);
      sp.appendChild(right);
      p1.appendChild(sp);
      body.appendChild(p1);

      // PART 2 — grammar induction
      var p2 = el('div.card');
      p2.appendChild(el('h3', { text: '2 · From examples to a grammar — identification in the limit' }));

      var ctrls = el('div', { style: { marginBottom: '14px' } });
      var inputRow = el('div.btn-row');
      refs.strInput = el('input', { type: 'text', value: 'abab', placeholder: 'string over {a,b}', style: { width: '160px' } });
      inputRow.appendChild(refs.strInput);
      var addPos = el('button.btn', { text: '+ positive' }); addPos.addEventListener('click', function () { var s = refs.strInput.value.replace(/[^ab]/g, ''); if (pos.indexOf(s) < 0) pos.push(s); renderGrammar(); });
      var addNeg = el('button.btn', { text: '− negative' }); addNeg.addEventListener('click', function () { var s = refs.strInput.value.replace(/[^ab]/g, ''); if (neg.indexOf(s) < 0) neg.push(s); renderGrammar(); });
      inputRow.appendChild(addPos); inputRow.appendChild(addNeg);
      ctrls.appendChild(inputRow);

      var sampleRow = el('div.btn-row', { style: { marginTop: '10px' } });
      sampleRow.appendChild(el('label.lab', { text: 'sample from hidden target:' }));
      ['a*b*', '(ab)*', 'aⁿbⁿ'].forEach(function (tn) {
        var bp = el('button.btn', { text: tn + ' +' }); bp.addEventListener('click', function () { sample(tn, '+'); });
        var bn = el('button.btn', { text: tn + ' −' }); bn.addEventListener('click', function () { sample(tn, '-'); });
        sampleRow.appendChild(bp); sampleRow.appendChild(bn);
      });
      var clr = el('button.btn', { text: 'clear' }); clr.addEventListener('click', function () { pos = []; neg = []; renderGrammar(); });
      sampleRow.appendChild(clr);
      ctrls.appendChild(sampleRow);
      p2.appendChild(ctrls);

      var exWrap = el('div.split-even');
      var pe = el('div'); pe.appendChild(el('h4', { text: 'positive examples (∈ L)' })); refs.posChips = el('div'); pe.appendChild(refs.posChips); exWrap.appendChild(pe);
      var ne = el('div'); ne.appendChild(el('h4', { text: 'negative examples (∉ L)' })); refs.negChips = el('div'); ne.appendChild(refs.negChips); exWrap.appendChild(ne);
      p2.appendChild(exWrap);

      p2.appendChild(el('h4', { text: 'hypothesis space', style: { marginTop: '16px' } }));
      refs.hyps = el('div'); p2.appendChild(refs.hyps);
      refs.verdict = el('div', { style: { marginTop: '10px' } }); p2.appendChild(refs.verdict);
      body.appendChild(p2);

      renderGav(); renderGrammar();
    }

    return { mount: mount };
  }

  LV.register({ id: 'grammar', no: 'IX', title: 'Gavagai → grammar', sub: 'Indeterminacy · Gold\u2019s theorem', create: mod });
})();

/* ===== js/app.js ===== */
/* ===========================================================================
   app.js — router + overview
   Builds the sidebar from LV.modules, instantiates a module on demand, and
   keeps the current view in the URL hash so it survives reload.
   ========================================================================= */
(function () {
  'use strict';

  var el = LV.el;
  var stage;
  var instances = {};
  var navItems = {};

  function overview(target) {
    LV.clear(target);

    target.appendChild(el('div.module-head', null,
      el('div.kicker', { text: 'a project in formal epistemology' }),
      el('h2', { text: 'The Architecture of Rational Belief' }),
      el('p', { text: 'Nine interactive instruments tracing a single question: how does a rational agent represent, update, and act on structured information under uncertainty — and where does that capacity reach its limit? Each module is live; nothing is pre-rendered.' })
    ));

    var body = el('div.module-body');
    target.appendChild(body);

    var prose = el('div.prose');
    prose.appendChild(el('p', null,
      el('b', { text: 'The spine. ' }),
      'We lay the foundations — first-order models and the satisfaction relation (I), and the proof theory that derives truths syntactically (II) — then study the logic of possibility and knowledge (III), reveal its hidden geometry (IV), and populate it with many interacting minds (V). From there representation turns into action (VI), self-interested agents reach equilibrium (VII) and we measure the social cost of their selfishness (VIII), before finally probing the epistemic boundary — the point at which data can no longer fix meaning or structure (IX). The arc runs from what can be proved, through how agents act and interact, to what cannot be inferred at all.'
    ));
    body.appendChild(prose);

    var grid = el('div.grid.overview-grid');

    var blurbs = {
      fol: 'A first-order structure — domain, constants, predicates, relations — and Tarski’s satisfaction relation. Test any sentence with ∀, ∃, =, and the connectives; open formulas return their satisfying assignments.',
      nd: 'A Fitch-style natural-deduction proof checker: assumptions open boxes, introduction rules discharge them, and the engine verifies every line, the scope of every citation, and whether the goal is actually proved.',
      kripke: 'Possible-worlds semantics. Build a frame, evaluate □ and ◇ world-by-world, and watch the modal axioms K, T, 4, B, 5 correspond to reflexivity, transitivity, symmetry, and the euclidean property.',
      topology: 'The McKinsey–Tarski theorem: S4 is the logic of topological space, with □ = interior and ◇ = closure. The same logic, now drawn as open sets and boundaries.',
      agents: 'Multi-agent epistemic logic. Indistinguishability relations, common and distributed knowledge, and public-announcement dynamics — the muddy-children puzzle solved by deleting worlds.',
      decision: 'Expected-utility theory and the evidential/causal schism, dramatised by Newcomb’s problem and a slider that finds exactly where the two decision theories disagree.',
      games: 'Strategic-form games and Nash equilibrium. Edit any payoff or load a classic game (Prisoner’s Dilemma, Stag Hunt, Matching Pennies) and watch best responses, pure and mixed equilibria, and dominant strategies recompute.',
      agt: 'The price of anarchy: how far a selfish equilibrium falls short of the social optimum. Pigou’s 4/3 bound and Braess’s paradox, where adding a road makes every driver slower.',
      grammar: 'Quine’s gavagai and Gold’s identification in the limit: a proof, made tactile, that finite data underdetermines both reference and grammar — and that learning needs a prior.'
    };

    LV.modules.forEach(function (m) {
      var card = el('div.card', { style: { cursor: 'pointer' } });

      card.appendChild(el('div.mono', {
        style: { fontSize: '11px', color: 'var(--gold)' },
        text: 'Module ' + m.no
      }));

      card.appendChild(el('h3', {
        style: { marginTop: '4px' },
        text: m.title
      }));

      card.appendChild(el('p.muted', {
        style: { fontSize: '13px' },
        text: blurbs[m.id] || m.sub
      }));

      card.addEventListener('click', function () {
        go(m.id);
      });

      grid.appendChild(card);
    });

    body.appendChild(grid);
  }

  function go(id) {
    Object.keys(navItems).forEach(function (k) {
      navItems[k].classList.toggle('active', k === id);
    });

    if (id === 'overview') {
      overview(stage);
      location.hash = '';
      return;
    }

    var def = LV.modules.find(function (m) {
      return m.id === id;
    });

    if (!def) {
      overview(stage);
      return;
    }

    if (!instances[id]) {
      instances[id] = def.create();
    }

    instances[id].mount(stage);
    location.hash = id;
  }

  function buildNav() {
    var side = document.getElementById('sidebar');
    if (!side) return;

    side.innerHTML = '';

    side.appendChild(el('div.brand', null,
      el('h1', { text: 'Logica Visualis' }),
      el('div.tag', { text: 'an interactive atlas of formal reasoning' })
    ));

    var toc = el('div.toc');

    var ov = el('div.nav-item', null,
      el('div', { style: { display: 'flex', gap: '8px', alignItems: 'baseline' } },
        el('span.ni-no', { text: '00' }),
        el('span.ni-title', { text: 'Overview' })
      ),
      el('span.ni-sub', { text: 'the through-line' })
    );

    ov.addEventListener('click', function () {
      go('overview');
    });

    navItems.overview = ov;
    toc.appendChild(ov);

    toc.appendChild(el('div.label', { text: 'modules' }));

    LV.modules.forEach(function (m) {
      var item = el('div.nav-item', null,
        el('div', { style: { display: 'flex', gap: '8px', alignItems: 'baseline' } },
          el('span.ni-no', { text: m.no }),
          el('span.ni-title', { text: m.title })
        ),
        el('span.ni-sub', { text: m.sub })
      );

      item.addEventListener('click', function () {
        go(m.id);
      });

      navItems[m.id] = item;
      toc.appendChild(item);
    });

    side.appendChild(toc);
    side.appendChild(el('div.sidebar-foot', {
      text: 'v7 · 9 modules · runs offline'
    }));
  }

  function setupMobileMenu() {
    var menuToggle = document.getElementById('menuToggle');
    var sidebar = document.getElementById('sidebar');
    var stageEl = document.getElementById('stage');
    var BP = 820;

    if (!menuToggle || !sidebar) return;

    function close() { document.body.classList.remove('menu-open'); menuToggle.textContent = '☰'; }

    menuToggle.addEventListener('click', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var open = document.body.classList.toggle('menu-open');
      menuToggle.textContent = open ? '✕' : '☰';
    });

    // tap a nav item -> close
    sidebar.addEventListener('click', function () {
      if (window.innerWidth <= BP) close();
    });

    // tap the dimmed backdrop (the exposed stage) -> close
    stageEl.addEventListener('click', function () {
      if (window.innerWidth <= BP && document.body.classList.contains('menu-open')) close();
    });

    // returning to desktop width -> always reset to the static layout
    window.addEventListener('resize', function () {
      if (window.innerWidth > BP) close();
    });
  }

  window.addEventListener('DOMContentLoaded', function () {
    stage = document.getElementById('stage');

    buildNav();

    var start = location.hash.replace('#', '') || 'overview';
    var exists = LV.modules.find(function (m) {
      return m.id === start;
    });

    go(exists ? start : 'overview');
    setupMobileMenu();
  });
})();

  </script>
